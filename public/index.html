<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CFKS · Atir Yeda — Gym Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f7f6f3; --surface: #ffffff; --border: #e4e2dc; --border2: #d0cec6;
      --text: #1a1916; --muted: #6b6860; --faint: #9b9890;
      --green: #2d6a4f; --green-bg: #d8f3dc;
      --red: #9b2226; --red-bg: #fde8e8;
      --now-bg: #fffbe6; --now-border: #e6c700;
      --radius-sm: 6px; --radius-lg: 14px;
      --mono: 'DM Mono', monospace; --sans: 'DM Sans', system-ui, sans-serif;
    }
    body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; padding: 2rem 1.5rem 4rem; }
    .topbar { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; margin-bottom: 2rem; max-width: 960px; margin-left: auto; margin-right: auto; flex-wrap: wrap; }
    .brand { display: flex; align-items: center; gap: 10px; }
    .brand-icon { width: 38px; height: 38px; border-radius: 10px; background: var(--text); display: flex; align-items: center; justify-content: center; }
    .brand-icon svg { width: 20px; height: 20px; fill: none; stroke: #fff; stroke-width: 2; stroke-linecap: round; }
    .brand-name { font-size: 17px; font-weight: 500; }
    .brand-sub { font-size: 12px; color: var(--muted); margin-top: 1px; }
    .topbar-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
    .clock-time { font-family: var(--mono); font-size: 22px; font-weight: 500; }
    .clock-date { font-size: 12px; color: var(--muted); margin-top: 1px; text-align: right; }
    .live-pill { display: flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 500; padding: 4px 10px; border-radius: 20px; background: var(--green-bg); color: var(--green); }
    .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }
    .btn { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 6px 12px; font-size: 12px; font-family: var(--sans); cursor: pointer; color: var(--muted); display: flex; align-items: center; gap: 5px; }
    .btn:hover { background: var(--bg); }
    .btn svg { width: 13px; height: 13px; flex-shrink: 0; }
    .btn.spinning svg { animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 1rem; max-width: 960px; margin: 0 auto; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem 1.5rem; }
    .card.span-4 { grid-column: span 4; }
    .card.span-5 { grid-column: span 5; }
    .card.span-7 { grid-column: span 7; }
    .card.span-8 { grid-column: span 8; }
    .card.span-12 { grid-column: span 12; }
    @media (max-width: 640px) { .card.span-4,.card.span-5,.card.span-7,.card.span-8,.card.span-12 { grid-column: span 12; } }
    .card-label { font-size: 10px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--faint); margin-bottom: 1rem; display: flex; align-items: center; gap: 6px; }
    .card-label svg { width: 12px; height: 12px; }

    /* Now card */
    .now-name { font-size: 26px; font-weight: 500; line-height: 1.1; margin-bottom: 4px; }
    .now-time { font-family: var(--mono); font-size: 13px; color: var(--muted); margin-bottom: 12px; }
    .pill-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .pill { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; padding: 3px 10px; border-radius: 20px; border: 1px solid var(--border); color: var(--muted); background: var(--bg); }
    .pill.green { background: var(--green-bg); color: var(--green); border-color: transparent; }
    .pill.red { background: var(--red-bg); color: var(--red); border-color: transparent; }
    .no-class { color: var(--faint); font-size: 13px; padding: 1.5rem 0; text-align: center; }

    /* Participants */
    .participants-list { display: flex; flex-direction: column; gap: 4px; margin-top: 10px; max-height: 200px; overflow-y: auto; }
    .participant-row { font-size: 12px; padding: 5px 8px; border-radius: var(--radius-sm); background: var(--bg); border: 1px solid var(--border); display: flex; align-items: center; gap: 6px; }
    .participant-row .num { font-size: 11px; color: var(--faint); min-width: 18px; }

    /* Next up */
    .next-list { display: flex; flex-direction: column; gap: 6px; }
    .next-row { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: var(--radius-sm); border: 1px solid var(--border); }
    .next-t { font-family: var(--mono); font-size: 12px; color: var(--muted); min-width: 48px; }
    .next-name { font-size: 13px; font-weight: 500; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .next-coach { font-size: 12px; color: var(--faint); white-space: nowrap; }
    .next-spots { font-size: 11px; padding: 2px 7px; border-radius: 10px; background: var(--green-bg); color: var(--green); white-space: nowrap; }
    .next-spots.full { background: var(--red-bg); color: var(--red); }

    /* WOD */
    .wod-name { font-size: 20px; font-weight: 500; margin-bottom: 8px; }
    .wod-time { font-family: var(--mono); font-size: 13px; color: var(--muted); margin-bottom: 10px; }
    .wod-note { font-size: 13px; line-height: 1.65; white-space: pre-wrap; color: var(--text); padding: 10px 14px; background: var(--bg); border-left: 2px solid var(--border2); border-radius: 0 4px 4px 0; }
    .wod-empty { font-size: 13px; color: var(--faint); }

    /* Schedule table */
    .sched-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .sched-table th { text-align: left; font-size: 10px; font-weight: 500; letter-spacing: 0.07em; text-transform: uppercase; color: var(--faint); padding: 0 8px 10px 0; border-bottom: 1px solid var(--border); }
    .sched-table td { padding: 10px 8px 10px 0; border-bottom: 1px solid var(--border); vertical-align: top; }
    .sched-table tr:last-child td { border-bottom: none; }
    .sched-table tr.is-now td { background: var(--now-bg); }
    .t-time { font-family: var(--mono); color: var(--muted); white-space: nowrap; }
    .t-name { font-weight: 500; }
    .t-coach { color: var(--muted); font-size: 12px; }
    .now-tag { font-size: 10px; font-weight: 500; padding: 1px 7px; border-radius: 10px; background: var(--now-border); color: #4a3800; margin-left: 6px; }
    .spots-badge { font-size: 11px; padding: 2px 7px; border-radius: 10px; }
    .spots-ok { background: var(--green-bg); color: var(--green); }
    .spots-no { background: var(--red-bg); color: var(--red); }
    .names-cell { font-size: 11px; color: var(--muted); line-height: 1.7; }

    .loading { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--faint); padding: 1rem 0; }
    .spinner { width: 15px; height: 15px; border-radius: 50%; border: 2px solid var(--border2); border-top-color: var(--text); animation: spin 0.7s linear infinite; flex-shrink: 0; }
    .empty { font-size: 13px; color: var(--faint); padding: 0.75rem 0; }
  </style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="brand-icon"><svg viewBox="0 0 24 24"><path d="M6 12h12M3 8v8M21 8v8M7 6v12M17 6v12"/></svg></div>
    <div>
      <div class="brand-name">CFKS · Atir Yeda</div>
      <div class="brand-sub">Gym Dashboard</div>
    </div>
  </div>
  <div class="topbar-right">
    <div>
      <div class="clock-time" id="clock">00:00:00</div>
      <div class="clock-date" id="date-str"></div>
    </div>
    <div class="live-pill"><span class="live-dot"></span>Live</div>
    <button class="btn" id="refresh-btn" onclick="loadAll()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 4v6h6"/><path d="M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
      Refresh
    </button>
  </div>
</div>

<div class="grid" style="margin-bottom:1rem">

  <!-- Current class -->
  <div class="card span-5">
    <div class="card-label">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      Current class
    </div>
    <div id="now-body"><div class="loading"><div class="spinner"></div>Loading…</div></div>
  </div>

  <!-- Current participants -->
  <div class="card span-7">
    <div class="card-label">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Participants now
    </div>
    <div id="participants-body"><div class="loading"><div class="spinner"></div>Loading…</div></div>
  </div>

  <!-- WOD -->
  <div class="card span-5">
    <div class="card-label">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 12h12M3 8v8M21 8v8M7 6v12M17 6v12"/></svg>
      Workout of the day
    </div>
    <div id="wod-body"><div class="loading"><div class="spinner"></div>Loading…</div></div>
  </div>

  <!-- Next up -->
  <div class="card span-7">
    <div class="card-label">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      Coming up today
    </div>
    <div id="next-body"><div class="loading"><div class="spinner"></div>Loading…</div></div>
  </div>

  <!-- Full schedule -->
  <div class="card span-12">
    <div class="card-label">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Today's full schedule
    </div>
    <div id="sched-body"><div class="loading"><div class="spinner"></div>Loading…</div></div>
  </div>

</div>

<script>
const PROXY = '/api/arbox';
const REFRESH_MS = 5 * 60 * 1000;

function tick() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleTimeString('he-IL', {hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
  document.getElementById('date-str').textContent =
    now.toLocaleDateString('en-IL', {weekday:'long',year:'numeric',month:'long',day:'numeric'});
}
setInterval(tick, 1000); tick();

function pad(n) { return String(n).padStart(2,'0'); }
function toMin(t) { if(!t) return -1; const [h,m]=t.split(':'); return parseInt(h)*60+parseInt(m||0); }
function fmt(t) { if(!t) return ''; const [h,m]=t.split(':'); return pad(parseInt(h))+':'+m; }
function nowMin() { const n=new Date(); return n.getHours()*60+n.getMinutes(); }
function isNow(c) {
  const s=toMin(c.start_time), e=toMin(c.end_time), nm=nowMin();
  return s>=0 && nm>=s && nm<(e>0?e:s+60);
}

function getCoach(c) {
  if (c.staff_member && c.staff_member.name) return c.staff_member.name;
  if (typeof c.staff_member === 'string') return c.staff_member;
  return '';
}

function getParticipants(c) {
  // registration_details returns array of registrations
  if (Array.isArray(c.registration_details)) return c.registration_details;
  if (Array.isArray(c.registrations)) return c.registrations;
  return [];
}

function getSpots(c) {
  var max = parseInt(c.max_participants) || 0;
  var registered = parseInt(c.registration_count) || 0;
  return { max: max, registered: registered, available: max - registered };
}

async function apiFetch(action) {
  const r = await fetch(PROXY + '?action=' + action);
  const text = await r.text();
  if (!r.ok) throw new Error(text.slice(0,300));
  const json = JSON.parse(text);
  return Array.isArray(json) ? json : (json.data || json);
}

function renderNow(classes) {
  const cur = classes.find(isNow);
  const el = document.getElementById('now-body');
  if (!cur) {
    el.innerHTML = '<div class="no-class">No class running right now</div>';
    return null;
  }
  const coach = getCoach(cur);
  const spots = getSpots(cur);
  const spotsHtml = spots.max > 0
    ? '<span class="pill ' + (spots.available > 0 ? 'green' : 'red') + '">' +
      (spots.available > 0 ? spots.registered + '/' + spots.max + ' registered' : 'Full') + '</span>'
    : '';
  el.innerHTML =
    '<div class="now-name">' + (cur.session_name || 'Class') + '</div>' +
    '<div class="now-time">' + fmt(cur.start_time) + ' – ' + fmt(cur.end_time) + '</div>' +
    '<div class="pill-row">' +
      (coach ? '<span class="pill">' + coach + '</span>' : '') +
      spotsHtml +
    '</div>';
  return cur;
}

function renderParticipants(curClass) {
  const el = document.getElementById('participants-body');
  if (!curClass) {
    el.innerHTML = '<div class="empty">No class running right now</div>';
    return;
  }
  const people = getParticipants(curClass);
  const spots  = getSpots(curClass);
  if (!people.length) {
    el.innerHTML =
      '<div class="empty">' +
        (spots.registered > 0
          ? spots.registered + ' registered (names not available)'
          : 'No registrations yet') +
      '</div>';
    return;
  }
  var html = '<div class="participants-list">';
  for (var i = 0; i < people.length; i++) {
    var p = people[i];
    var name = (p.first_name || '') + ' ' + (p.last_name || '');
    if (!name.trim()) name = p.name || p.user_name || 'Member';
    html += '<div class="participant-row"><span class="num">' + (i+1) + '</span>' + name.trim() + '</div>';
  }
  html += '</div>';
  if (spots.max > 0) {
    html += '<div style="font-size:11px;color:var(--faint);margin-top:8px">' +
      spots.registered + ' of ' + spots.max + ' spots filled</div>';
  }
  el.innerHTML = html;
}

function renderWOD(classes) {
  const el = document.getElementById('wod-body');
  // Find class with session_name containing WOD or W.O.D
  var wod = classes.find(function(c) {
    var n = (c.session_name || '').toLowerCase();
    return n.indexOf('wod') >= 0 || n.indexOf('w.o.d') >= 0 || n.indexOf('workout') >= 0;
  });
  if (!wod) {
    // Just show first class of the day as WOD
    wod = classes[0];
  }
  if (!wod) {
    el.innerHTML = '<div class="wod-empty">No workout found for today.</div>';
    return;
  }
  var noteHtml = wod.note
    ? '<div class="wod-note">' + wod.note + '</div>'
    : (wod.custom_field_value && wod.custom_field_value.length
        ? '<div class="wod-note">' + wod.custom_field_value.join('\n') + '</div>'
        : '<div class="wod-empty" style="margin-top:8px">No workout description added in Arbox yet.<br>Add it in the class Notes field.</div>');
  el.innerHTML =
    '<div class="wod-name">' + (wod.session_name || 'W.O.D') + '</div>' +
    '<div class="wod-time">' + fmt(wod.start_time) + ' – ' + fmt(wod.end_time) + '</div>' +
    noteHtml;
}

function renderNext(classes) {
  const nm = nowMin();
  const up = classes.filter(function(c){ return toMin(c.start_time) > nm; }).slice(0,6);
  const el = document.getElementById('next-body');
  if (!up.length) { el.innerHTML='<div class="empty">No more classes today 🎉</div>'; return; }
  var html = '<div class="next-list">';
  for (var i=0; i<up.length; i++) {
    var c = up[i];
    var spots = getSpots(c);
    var spotsTag = spots.max > 0
      ? '<span class="next-spots' + (spots.available <= 0 ? ' full' : '') + '">' +
        (spots.available > 0 ? spots.available + ' left' : 'Full') + '</span>'
      : '';
    html += '<div class="next-row">' +
      '<span class="next-t">' + fmt(c.start_time) + '</span>' +
      '<span class="next-name">' + (c.session_name || 'Class') + '</span>' +
      '<span class="next-coach">' + getCoach(c) + '</span>' +
      spotsTag +
      '</div>';
  }
  html += '</div>';
  el.innerHTML = html;
}

function renderSchedule(classes) {
  const el = document.getElementById('sched-body');
  if (!classes.length) { el.innerHTML='<div class="empty">No classes found for today.</div>'; return; }
  var html = '<table class="sched-table">' +
    '<thead><tr><th>Time</th><th>Class</th><th>Coach</th><th>Spots</th><th>Participants</th></tr></thead><tbody>';
  for (var i=0; i<classes.length; i++) {
    var c = classes[i];
    var now = isNow(c);
    var spots = getSpots(c);
    var people = getParticipants(c);
    var spotsHtml = spots.max > 0
      ? '<span class="spots-badge ' + (spots.available > 0 ? 'spots-ok' : 'spots-no') + '">' +
        spots.registered + '/' + spots.max + '</span>'
      : '—';
    var namesHtml = people.length > 0
      ? '<div class="names-cell">' + people.map(function(p){
          return ((p.first_name||'') + ' ' + (p.last_name||'')).trim() || p.name || 'Member';
        }).join(' · ') + '</div>'
      : (spots.registered > 0 ? '<span style="color:var(--faint);font-size:11px">' + spots.registered + ' registered</span>' : '—');
    html += '<tr class="' + (now ? 'is-now' : '') + '">' +
      '<td class="t-time">' + fmt(c.start_time) + ' – ' + fmt(c.end_time) +
        (now ? '<span class="now-tag">Now</span>' : '') + '</td>' +
      '<td class="t-name">' + (c.session_name || 'Class') + '</td>' +
      '<td class="t-coach">' + getCoach(c) + '</td>' +
      '<td>' + spotsHtml + '</td>' +
      '<td>' + namesHtml + '</td>' +
      '</tr>';
  }
  html += '</tbody></table>';
  el.innerHTML = html;
}

var refreshTimer = null;
async function loadAll() {
  document.getElementById('refresh-btn').classList.add('spinning');
  var loading = '<div class="loading"><div class="spinner"></div>Loading…</div>';
  ['now-body','participants-body','wod-body','next-body','sched-body'].forEach(function(id){
    document.getElementById(id).innerHTML = loading;
  });

  try {
    var raw = await apiFetch('schedule');
    var classes = Array.isArray(raw) ? raw : [];
    classes.sort(function(a,b){ return toMin(a.start_time)-toMin(b.start_time); });

    var curClass = renderNow(classes);
    renderParticipants(curClass);
    renderWOD(classes);
    renderNext(classes);
    renderSchedule(classes);
  } catch(e) {
    ['now-body','participants-body','wod-body','next-body','sched-body'].forEach(function(id){
      document.getElementById(id).innerHTML = '<div class="empty" style="color:var(--red)">' + e.message + '</div>';
    });
  }

  document.getElementById('refresh-btn').classList.remove('spinning');
  if (refreshTimer) clearTimeout(refreshTimer);
  refreshTimer = setTimeout(loadAll, REFRESH_MS);
}

loadAll();
</script>
</body>
</html>
