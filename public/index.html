<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CFKS · Atir Yeda — Gym Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f7f6f3; --surface: #ffffff; --border: #e4e2dc; --border2: #d0cec6;
      --text: #1a1916; --muted: #6b6860; --faint: #9b9890;
      --green: #2d6a4f; --green-bg: #d8f3dc;
      --red: #9b2226; --red-bg: #fde8e8;
      --now-bg: #fffbe6; --now-border: #e6c700;
      --radius-sm: 6px; --radius-lg: 14px;
      --mono: 'DM Mono', monospace; --sans: 'DM Sans', system-ui, sans-serif;
    }
    body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; padding: 2rem 1.5rem 4rem; }
    .topbar { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; margin-bottom: 2rem; max-width: 960px; margin-left: auto; margin-right: auto; flex-wrap: wrap; }
    .brand { display: flex; align-items: center; gap: 10px; }
    .brand-icon { width: 38px; height: 38px; border-radius: 10px; background: var(--text); display: flex; align-items: center; justify-content: center; }
    .brand-icon svg { width: 20px; height: 20px; fill: none; stroke: #fff; stroke-width: 2; stroke-linecap: round; }
    .brand-name { font-size: 17px; font-weight: 500; }
    .brand-sub { font-size: 12px; color: var(--muted); margin-top: 1px; }
    .topbar-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
    .clock-time { font-family: var(--mono); font-size: 22px; font-weight: 500; }
    .clock-date { font-size: 12px; color: var(--muted); margin-top: 1px; text-align: right; }
    .live-pill { display: flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 500; padding: 4px 10px; border-radius: 20px; background: var(--green-bg); color: var(--green); }
    .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }
    .btn { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 6px 12px; font-size: 12px; font-family: var(--sans); cursor: pointer; color: var(--muted); display: flex; align-items: center; gap: 5px; }
    .btn:hover { background: var(--bg); }
    .btn svg { width: 13px; height: 13px; flex-shrink: 0; }
    .btn.spinning svg { animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 1rem; max-width: 960px; margin: 0 auto; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem 1.5rem; }
    .card.span-4 { grid-column: span 4; }
    .card.span-5 { grid-column: span 5; }
    .card.span-7 { grid-column: span 7; }
    .card.span-8 { grid-column: span 8; }
    .card.span-12 { grid-column: span 12; }
    @media (max-width: 640px) { .card.span-4,.card.span-5,.card.span-7,.card.span-8,.card.span-12 { grid-column: span 12; } }
    .card-label { font-size: 10px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--faint); margin-bottom: 1rem; display: flex; align-items: center; gap: 6px; }
    .card-label svg { width: 12px; height: 12px; }

    /* Now card */
    .now-name { font-size: 26px; font-weight: 500; line-height: 1.1; margin-bottom: 4px; }
    .now-time { font-family: var(--mono); font-size: 13px; color: var(--muted); margin-bottom: 12px; }
    .pill-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .pill { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; padding: 3px 10px; border-radius: 20px; border: 1px solid var(--border); color: var(--muted); background: var(--bg); }
    .pill.green { background: var(--green-bg); color: var(--green); border-color: transparent; }
    .pill.red { background: var(--red-bg); color: var(--red); border-color: transparent; }
    .no-class { color: var(--faint); font-size: 13px; padding: 1.5rem 0; text-align: center; }

    /* Participants */
    .participants-list { display: flex; flex-direction: column; gap: 4px; margin-top: 10px; max-height: 200px; overflow-y: auto; }
    .participant-row { font-size: 12px; padding: 5px 8px; border-radius: var(--radius-sm); background: var(--bg); border: 1px solid var(--border); display: flex; align-items: center; gap: 6px; }
    .participant-row .num { font-size: 11px; color: var(--faint); min-width: 18px; }

    /* Next up */
    .next-list { display: flex; flex-direction: column; gap: 6px; }
    .next-row { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: var(--radius-sm); border: 1px solid var(--border); }
    .next-t { font-family: var(--mono); font-size: 12px; color: var(--muted); min-width: 48px; }
    .next-name { font-size: 13px; font-weight: 500; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .next-coach { font-size: 12px; color: var(--faint); white-space: nowrap; }
    .next-spots { font-size: 11px; padding: 2px 7px; border-radius: 10px; background: var(--green-bg); color: var(--green); white-space: nowrap; }
    .next-spots.full { background: var(--red-bg); color: var(--red); }

    /* WOD */
    .wod-name { font-size: 20px; font-weight: 500; margin-bottom: 8px; }
    .wod-time { font-family: var(--mono); font-size: 13px; color: var(--muted); margin-bottom: 10px; }
    .wod-note { font-size: 13px; line-height: 1.65; white-space: pre-wrap; color: var(--text); padding: 10px 14px; background: var(--bg); border-left: 2px solid var(--border2); border-radius: 0 4px 4px 0; }
    .wod-empty { font-size: 13px; color: var(--faint); }

    /* Schedule table */
    .sched-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .sched-table th { text-align: left; font-size: 10px; font-weight: 500; letter-spacing: 0.07em; text-transform: uppercase; color: var(--faint); padding: 0 8px 10px 0; border-bottom: 1px solid var(--border); }
    .sched-table td { padding: 10px 8px 10px 0; border-bottom: 1px solid var(--border); vertical-align: top; }
    .sched-table tr:last-child td { border-bottom: none; }
    .sched-table tr.is-now td { background: var(--now-bg); }
    .t-time { font-family: var(--mono); color: var(--muted); white-space: nowrap; }
    .t-name { font-weight: 500; }
    .t-coach { color: var(--muted); font-size: 12px; }
    .now-tag { font-size: 10px; font-weight: 500; padding: 1px 7px; border-radius: 10px; background: var(--now-border); color: #4a3800; margin-left: 6px; }
    .spots-badge { font-size: 11px; padding: 2px 7px; border-radius: 10px; }
    .spots-ok { background: var(--green-bg); color: var(--green); }
    .spots-no { background: var(--red-bg); color: var(--red); }
    .names-cell { font-size: 11px; color: var(--muted); line-height: 1.7; }

    .loading { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--faint); padding: 1rem 0; }
    .spinner { width: 15px; height: 15px; border-radius: 50%; border: 2px solid var(--border2); border-top-color: var(--text); animation: spin 0.7s linear infinite; flex-shrink: 0; }
    .empty { font-size: 13px; color: var(--faint); padding: 0.75rem 0; }
  </style>
</head>

    <div>
      <div class="brand-name">CFKS · Atir Yeda</div>
      <div class="brand-sub">Gym Dashboard</div>

  <div class="topbar-right">
    <div>
      <div class="clock-time" id="clock">00:00:00</div>
      <div class="clock-date" id="date-str"></div>

    <div class="live-pill"><span class="live-dot"></span>Live</div>

    </button>

</div>

  <div class="card span-5">
    <div class="card-label">
      <svg viewBox="0 0 24 24"
